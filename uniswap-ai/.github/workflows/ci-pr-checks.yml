name: PR Checks

on:
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Pre-check job to detect automated PRs
  check-automated:
    name: Check Automated PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is_automated: ${{ steps.check.outputs.is_automated }}
      category: ${{ steps.check.outputs.category }}
      skip_reason: ${{ steps.check.outputs.skip_reason }}
      # Skip CI for release/sync/action-update PRs, but NOT for dependency updates (which need testing)
      should_skip_ci: ${{ steps.check.outputs.is_automated == 'true' && steps.check.outputs.category != 'deps' }}
    steps:
      - uses: bullfrogsec/bullfrog@1831f79cce8ad602eef14d2163873f27081ebfb3 # v0.8.4

      - name: Checkout repository (for composite action)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Check for automated PR
        id: check
        uses: ./.github/actions/check-automated-pr
        with:
          branch_name: ${{ github.head_ref }}
          pr_title: ${{ github.event.pull_request.title }}

  validate:
    name: Validate Installation & Build
    needs: check-automated
    # Skip for automated PRs except dependency updates (which should still run tests)
    if: ${{ needs.check-automated.outputs.should_skip_ci != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Override nx.json defaultBase for PR target branch
      NX_BASE: origin/${{ github.base_ref }}
      NX_HEAD: HEAD

    steps:
      - uses: bullfrogsec/bullfrog@1831f79cce8ad602eef14d2163873f27081ebfb3 # v0.8.4

      # Setup tools BEFORE checking out PR code so attacker-supplied configs
      # (.npmrc, bunfig.toml) in the PR cannot influence tool installation.
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ vars.NODE_VERSION || '22' }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ vars.BUN_VERSION || '1.3.13' }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install dependencies (verifies bun.lock is in sync)
        # --frozen-lockfile fails the install if the lockfile would need to
        # change to satisfy package.json — equivalent to the npm package-lock
        # drift check. minimumReleaseAge (bunfig.toml) blocks freshly-published
        # malicious package versions. --ignore-scripts blocks lifecycle-script
        # RCE from a PR-controlled root or workspace package.json
        # `preinstall`/`postinstall`/`prepare` hook (Shai-Hulud / s1ngularity-
        # class). Bun's default model already requires explicit
        # `trustedDependencies` for transitive deps, so this flag mainly
        # protects against scripts in PR-modified workspace package.json files.
        run: |
          echo "Installing dependencies with frozen lockfile..."
          if ! bun install --frozen-lockfile --ignore-scripts; then
            echo "❌ bun.lock is out of sync with package.json"
            echo "Run 'bun install' locally and commit the updated bun.lock"
            exit 1
          fi
          echo "✅ Dependencies installed; bun.lock in sync"

      # Pin nx via --package=nx@<version> to defeat local-bin shadowing from
      # malicious PRs. A PR-supplied workspace package can legitimately
      # ship `bin: { nx: ... }` that wins resolution in node_modules/.bin
      # even with --frozen-lockfile (same primitive as Cantina finding
      # #584 — npx tsx bin hijack). The `bunx --package=nx@X nx ...` form
      # forces a registry fetch of the pinned version and bypasses
      # node_modules/.bin. Update the version here when upgrading nx in
      # package.json.
      - name: Build changed packages
        run: |
          echo "Building changed packages..."
          bunx --package=nx@22.0.2 nx affected --target=build --verbose
          echo "✅ Build(s) completed successfully"

      - name: Run linting
        run: |
          echo "Running linters..."
          bunx --package=nx@22.0.2 nx affected --target=lint --verbose
          echo "✅ Linting passed"

      - name: Check formatting
        run: |
          echo "Checking code formatting..."
          bunx --package=nx@22.0.2 nx format:check --base=$NX_BASE --head=$NX_HEAD
          echo "✅ Formatting check passed"

      - name: Install Vale
        run: |
          echo "Installing Vale..."
          wget https://github.com/errata-ai/vale/releases/download/v3.0.7/vale_3.0.7_Linux_64-bit.tar.gz
          tar -xvzf vale_3.0.7_Linux_64-bit.tar.gz
          sudo mv vale /usr/local/bin/
          vale --version

      - name: Lint documentation prose (Vale)
        continue-on-error: true
        run: |
          echo "Checking documentation prose quality..."
          vale docs/ || echo "::warning::Vale found documentation issues - see output above"

      - name: Run tests
        run: |
          echo "Running tests..."
          bunx --package=nx@22.0.2 nx affected --target=test --parallel=3 --coverage --verbose
          echo "✅ Tests passed"

  validate-plugins:
    name: Validate Plugins
    needs: check-automated
    # Skip for automated PRs except dependency updates (which should still run tests)
    if: ${{ needs.check-automated.outputs.should_skip_ci != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: bullfrogsec/bullfrog@1831f79cce8ad602eef14d2163873f27081ebfb3 # v0.8.4

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ vars.NODE_VERSION || '22' }}

      - name: Validate all plugins
        uses: ./.github/actions/validate-plugins
        with:
          marketplace-path: '.claude-plugin/marketplace.json'
          fail-on-warning: 'false'

  validate-skills:
    name: Validate Skills
    needs: check-automated
    if: ${{ needs.check-automated.outputs.should_skip_ci != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: bullfrogsec/bullfrog@1831f79cce8ad602eef14d2163873f27081ebfb3 # v0.8.4

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ vars.NODE_VERSION || '22' }}

      - name: Validate skills
        uses: ./.github/actions/validate-skills

  validate-docs:
    name: Validate Documentation
    needs: check-automated
    if: ${{ needs.check-automated.outputs.should_skip_ci != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: bullfrogsec/bullfrog@1831f79cce8ad602eef14d2163873f27081ebfb3 # v0.8.4

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ vars.NODE_VERSION || '22' }}

      - name: Validate documentation pages
        uses: ./.github/actions/validate-docs

  check-eval-coverage:
    name: Check Eval Coverage
    needs: check-automated
    if: ${{ needs.check-automated.outputs.should_skip_ci != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: bullfrogsec/bullfrog@1831f79cce8ad602eef14d2163873f27081ebfb3 # v0.8.4

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check eval coverage for changed skills
        uses: ./.github/actions/check-eval-coverage
        with:
          base-ref: origin/${{ github.base_ref }}
          require-coverage: 'true'

  # Summary job for automated PRs that were skipped
  skipped-summary:
    name: CI Skipped (Automated PR)
    needs: check-automated
    if: ${{ needs.check-automated.outputs.should_skip_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: bullfrogsec/bullfrog@1831f79cce8ad602eef14d2163873f27081ebfb3 # v0.8.4

      - name: Report skipped status
        env:
          SKIP_REASON: ${{ needs.check-automated.outputs.skip_reason }}
        run: |
          echo "::notice::CI checks skipped for automated PR: $SKIP_REASON"
          echo "✅ Automated PR detected - CI checks are not required for this PR type."
