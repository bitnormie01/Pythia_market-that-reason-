[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = false
fs_permissions = [{ access = "read", path = "./" }]
gas_reports = ["PythiaHook", "PythiaAIProvider", "PythiaPeriphery", "OutcomeToken"]

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 64
depth = 32
fail_on_revert = false

[rpc_endpoints]
xlayer = "https://rpc.xlayer.tech"
xlayer_backup = "https://rpc.ankr.com/xlayer"

[etherscan]
xlayer = { key = "${OKLINK_API_KEY}", url = "https://www.oklink.com/api/v5/explorer/contract/verify-source-code" }
